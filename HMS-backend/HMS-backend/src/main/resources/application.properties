spring.application.name=zenohms

# ──────────────────────────────────────────────
# Database — PostgreSQL (Supabase Pooled)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ──────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400

# ──────────────────────────────────────────────
# SSO Cookie (shared HttpOnly cookie — matches sso_token used across all zenohosp apps)
# ──────────────────────────────────────────────
sso.cookie.name=${SSO_COOKIE_NAME:sso_token}
sso.cookie.domain=${SSO_COOKIE_DOMAIN:localhost}
sso.cookie.secure=${SSO_COOKIE_SECURE:false}
sso.cookie.max-age=${SSO_COOKIE_MAX_AGE:86400}

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=${PORT:9001}
server.servlet.session.cookie.name=HMS_SESSION
server.forward-headers-strategy=FRAMEWORK

# ──────────────────────────────────────────────
# Timezone — all hospitals run in IST. Dockerfile pins the JVM via TZ env +
# -Duser.timezone, but this also makes Jackson emit Instant/Date with the
# IST offset rather than UTC by default.
# ──────────────────────────────────────────────
spring.jackson.time-zone=Asia/Kolkata

# ──────────────────────────────────────────────
# Debug
# ──────────────────────────────────────────────
logging.level.com.zenlocare=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ──────────────────────────────────────────────
# Google OAuth2
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ──────────────────────────────────────────────
# Directory SSO OAuth2 Client
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.directory.client-id=${DIRECTORY_CLIENT_ID}
spring.security.oauth2.client.registration.directory.client-secret=${DIRECTORY_CLIENT_SECRET}
spring.security.oauth2.client.registration.directory.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.directory.redirect-uri=${FRONTEND_URL}/login/oauth2/code/directory
spring.security.oauth2.client.registration.directory.scope=read

# Directory server endpoints — hardcoded (infrastructure constant, not per-environment)
spring.security.oauth2.client.provider.directory.authorization-uri=https://api-directory.zenohosp.com/oauth2/authorize
spring.security.oauth2.client.provider.directory.token-uri=https://api-directory.zenohosp.com/oauth2/token
spring.security.oauth2.client.provider.directory.user-info-uri=https://api-directory.zenohosp.com/api/users/me
spring.security.oauth2.client.provider.directory.user-name-attribute=email

# Directory base URL (used by AuthService for credential login proxy)
directory.api.url=https://api-directory.zenohosp.com

# Frontend URL (for post-SSO redirect)
frontend.url=${FRONTEND_URL}

# ──────────────────────────────────────────────
# Multipart uploads — wired now so when the attachment upload feature
# lands the endpoint already has a sane default policy. 10MB cap on
# a single file, spooled to disk above 512KB so a large upload
# doesn't pin heap for the duration of the request.
# ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
spring.servlet.multipart.file-size-threshold=512KB

# ──────────────────────────────────────────────
# Labs service (radiology + health checkups now owned by labs).
# HMS backend calls labs over RestTemplate for the appointment +
# smart-billing cross-cuts; the frontend hits labs directly for those
# domains. Default points to the local labs port; production sets
# LABS_API_URL=https://api-labs.zenohosp.com via env.
# ──────────────────────────────────────────────
labs.api.url=${LABS_API_URL:http://localhost:8086}
