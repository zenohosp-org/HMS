spring.application.name=zenohms

# ──────────────────────────────────────────────
# Database — PostgreSQL (Supabase Pooled)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ──────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400

# ──────────────────────────────────────────────
# Cookie (HttpOnly, used for session-based auth)
# ──────────────────────────────────────────────
jwt.cookie.name=${JWT_COOKIE_NAME:ZENOHMS_TOKEN}
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
jwt.cookie.domain=${JWT_COOKIE_DOMAIN:localhost}

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=${PORT:9001}
server.servlet.session.cookie.name=HMS_SESSION
server.forward-headers-strategy=FRAMEWORK

# ──────────────────────────────────────────────
# Debug
# ──────────────────────────────────────────────
debug=true
logging.level.com.zenlocare=DEBUG

# ──────────────────────────────────────────────
# Google OAuth2
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ──────────────────────────────────────────────
# Directory SSO OAuth2 Client (HMS as OAuth2 Client)
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.directory.client-id=${DIRECTORY_CLIENT_ID}
spring.security.oauth2.client.registration.directory.client-secret=${DIRECTORY_CLIENT_SECRET}
spring.security.oauth2.client.registration.directory.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.directory.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.directory.scope=read

spring.security.oauth2.client.provider.directory.authorization-uri=${DIRECTORY_AUTH_URI}
spring.security.oauth2.client.provider.directory.token-uri=${DIRECTORY_TOKEN_URI}
spring.security.oauth2.client.provider.directory.user-info-uri=${DIRECTORY_USER_INFO_URI}
spring.security.oauth2.client.provider.directory.user-name-attribute=email

# Directory API base URL
directory.api.url=${DIRECTORY_API_URL:}

# Frontend URL (for post-login redirect)
frontend.url=${FRONTEND_URL:}
