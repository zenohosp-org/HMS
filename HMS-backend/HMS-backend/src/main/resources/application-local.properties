spring.application.name=zenohms

# ──────────────────────────────────────────────
# Database — PostgreSQL (Supabase Pooled)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.qmfupslqooexhshomnhw}
spring.datasource.password=${DB_PASS:Javatech@2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ──────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET:jhhuhjkhfu8374rwqloiqipaz8cuy39mjnncbvbbzma289eh3u}
jwt.expiration=86400

# ──────────────────────────────────────────────
# Cookie
# ──────────────────────────────────────────────
jwt.cookie.name=ZENOHMS_TOKEN
jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
jwt.cookie.domain=${JWT_COOKIE_DOMAIN:localhost}

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=${PORT:9001}
server.servlet.session.cookie.name=HMS_SESSION
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax

# ──────────────────────────────────────────────
# Debug
# ──────────────────────────────────────────────
debug=true
logging.level.com.zenlocare=DEBUG

# ──────────────────────────────────────────────
# Google OAuth2
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:966447659179-60kfh1q0ls42l0kkugbi1i5ceqd5t4to.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ──────────────────────────────────────────────
# Directory SSO OAuth2 Client (HMS as OAuth2 Client)
# ──────────────────────────────────────────────
spring.security.oauth2.client.registration.directory.client-id=${DIRECTORY_CLIENT_ID:hms-client}
spring.security.oauth2.client.registration.directory.client-secret=${DIRECTORY_CLIENT_SECRET:hms-secret-key-2026}
spring.security.oauth2.client.registration.directory.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.directory.redirect-uri=${DIRECTORY_REDIRECT_URI:http://localhost:9001/login/oauth2/code/directory}
spring.security.oauth2.client.registration.directory.scope=read

spring.security.oauth2.client.provider.directory.authorization-uri=${DIRECTORY_AUTH_URI:http://localhost:9000/oauth2/authorize}
spring.security.oauth2.client.provider.directory.token-uri=${DIRECTORY_TOKEN_URI:http://localhost:9000/oauth2/token}
spring.security.oauth2.client.provider.directory.user-info-uri=${DIRECTORY_USER_INFO_URI:http://localhost:9000/api/users/me}
spring.security.oauth2.client.provider.directory.user-name-attribute=email

# Directory API URL (for proxying login)
directory.api.url=${DIRECTORY_API_URL:http://localhost:9000}

# Frontend URL (for post-login redirect)
frontend.url=${FRONTEND_URL:http://localhost:5174}
